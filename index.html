<!doctype html>
<html lang="en" data-theme="dark" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Titan — Personal Productivity App | Tasks, Notes & Finance</title>
    <meta name="title" content="Titan — Personal Productivity App | Tasks, Notes & Finance" />
    <meta
      name="description"
      content="Titan is a free, offline-first productivity app that unifies task management, note-taking, and expense tracking in one sleek workspace. Works without internet. Install as a PWA."
    />
    <meta
      name="keywords"
      content="productivity app, task manager, note taking app, expense tracker, finance tracker, offline app, PWA, personal organizer, todo list, budget tracker, free productivity tool, split expenses app"
    />
    <meta name="author" content="Titan" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#1a7fe8" />

    <!-- PWA / Mobile SEO -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Titan" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Titan" />
    <meta property="og:title" content="Titan — Tasks, Notes & Finance in One Place" />
    <meta
      property="og:description"
      content="A free, offline-first workspace that unifies task management, notes, and expense tracking. Install it as a PWA and use it without internet."
    />
    <meta property="og:image" content="https://titanapp.qzz.io/Opengraph.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://titanapp.qzz.io/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Titan — Tasks, Notes & Finance in One Place" />
    <meta
      name="twitter:description"
      content="Manage your tasks, notes, and finances from one beautifully designed, offline-ready app. Free forever, no account needed."
    />
    <meta name="twitter:image" content="https://titanapp.qzz.io/Opengraph.png" />

    <link rel="canonical" href="https://titanapp.qzz.io/" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/titan-icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/titan-icon-180.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Titan",
      "url": "https://titanapp.qzz.io/",
      "description": "An offline-first productivity app that unifies task management, note-taking, and expense tracking in one sleek workspace. No account required.",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "All",
      "author": {
        "@type": "Organization",
        "name": "Titan App"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": ["Task Management", "Note Taking", "Expense Tracking", "Offline Support", "PWA"],
      "screenshot": "https://titanapp.qzz.io/Opengraph.png"
    }
    </script>

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem('titan-theme');
          const theme = storedTheme === 'light' ? 'light' : 'dark';
          const root = document.documentElement;

          root.dataset.theme = theme;
          root.classList.toggle('dark', theme === 'dark');
        } catch {
          document.documentElement.dataset.theme = 'dark';
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
