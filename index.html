<!doctype html>
<html lang="en" data-theme="dark" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Titan - The Ultimate Productivity Hub</title>
    <meta name="title" content="Titan - The Ultimate Productivity Hub" />
    <meta
      name="description"
      content="Titan: A stunning, offline-first workspace blending Tasks, Notes, and Finance seamlessly."
    />
    <meta
      name="keywords"
      content="Titan, productivity app, tasks, notes, finance tracker, offline-first, PWA, modern UI"
    />
    <meta name="author" content="Titan" />
    <meta name="theme-color" content="#090a0f" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Titan - The Ultimate Productivity Hub" />
    <meta
      property="og:description"
      content="A stunning, offline-first workspace blending Tasks, Notes, and Finance seamlessly."
    />
    <meta property="og:image" content="/Opengraph.png" />
    <meta property="og:url" content="https://titanapp.qzz.io/" />
    <meta property="og:site_name" content="Titan" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Titan - The Ultimate Productivity Hub" />
    <meta
      name="twitter:description"
      content="Titan helps you manage tasks, notes, and finance from a single visually stunning workspace."
    />
    <meta name="twitter:image" content="/Opengraph.png" />

    <link rel="canonical" href="https://titanapp.qzz.io/" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/titan-icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/titan-icon-180.png" />

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem('titan-theme');
          const theme = storedTheme === 'light' ? 'light' : 'dark';
          const root = document.documentElement;

          root.dataset.theme = theme;
          root.classList.toggle('dark', theme === 'dark');
        } catch {
          document.documentElement.dataset.theme = 'dark';
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
