name: Bug Report
description: File a report to help us improve Titan
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you were doing when the bug occurred.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Open the app
        2. Go to '...'
        3. Click on '....'
        4. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Titan Version
      description: What version of Titan are you using? (Check Settings > About)
      placeholder: e.g. 0.1.0-beta
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: What platform are you using?
      options:
        - iOS (PWA)
        - Android (PWA)
        - Windows (Chrome/Edge/Firefox)
        - macOS (Safari/Chrome)
        - Linux
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the problem here.
